<!DOCTYPE html>  
<html lang="pt-br">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>Minha Página com Bootstrap - SENAC/SC</title>  
  
    <!-- 1. CSS do Bootstrap via CDN -->  
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">  
</head>  
<body>  
  
    <div class="container mt-5">  
        <h1 class="text-primary">Olá, Bootstrap!</h1>  
        <p class="lead">Esta página já está utilizando estilos profissionais via CDN.</p>  
          
        <button class="btn btn-success">Botão de Sucesso</button>  
        <button class="btn btn-danger">Botão de Erro</button>  
    </div>  
  
    <!-- 2. JS do Bootstrap via CDN (Necessário para componentes interativos como Modais e Dropdowns) -->  
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>  
</body>  
</html>
